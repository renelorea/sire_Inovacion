name: tres_en_linea_cecytem
description: Juego educativo de Tres en Línea con identidad institucional.
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^5.2.1
  google_fonts: ^6.1.0
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/
    - assets/fonts/

  fonts:
    - family: CECyTEM
      fonts:
        - asset: assets/fonts/Blazed.ttf
